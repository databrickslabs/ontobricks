[pytest]
pythonpath = src
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    asyncio: Async tests
filterwarnings =
    ignore::DeprecationWarning:rdflib.plugins.sparql.parser
    ignore::DeprecationWarning:rdflib.plugins.parsers.notation3
    ignore::DeprecationWarning:pyparsing.util

