<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - OntoBricks</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='global/img/favicon.svg') }}?v=2">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="text-center" style="max-width: 480px;">
            <i class="bi bi-shield-lock text-danger" style="font-size: 4rem;"></i>
            <h3 class="mt-3 mb-2">Access Denied</h3>
            <p class="text-muted mb-4">
                You do not have permission to access OntoBricks.
            </p>

            {% if user_email %}
            <div class="card border-0 bg-white mb-4">
                <div class="card-body py-3">
                    <small class="text-muted d-block mb-1">Signed in as</small>
                    <span class="fw-semibold">{{ user_email }}</span>
                </div>
            </div>
            {% endif %}

            <p class="small text-muted">
                Ask an OntoBricks administrator to add your account to the
                permission list in <strong>Settings &rarr; Permissions</strong>.
            </p>
        </div>
    </div>
</body>
</html>
