<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Bridge connecting data to knowledge -->
  
  <!-- Left pillar (Data) -->
  <rect x="8" y="24" width="14" height="32" rx="2" fill="#FF3621"/>
  <text x="15" y="54" font-size="6" fill="white" text-anchor="middle" font-weight="bold">D</text>
  
  <!-- Right pillar (Knowledge) -->
  <rect x="42" y="24" width="14" height="32" rx="2" fill="#4ECDC4"/>
  <text x="49" y="54" font-size="6" fill="white" text-anchor="middle" font-weight="bold">K</text>
  
  <!-- Bridge arc -->
  <path d="M15 24 Q32 4 49 24" stroke="#6366F1" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Nodes on bridge -->
  <circle cx="22" cy="16" r="4" fill="#6366F1"/>
  <circle cx="32" cy="10" r="5" fill="#F59E0B"/>
  <circle cx="42" cy="16" r="4" fill="#6366F1"/>
  
  <!-- Connection lines -->
  <line x1="26" y1="15" x2="28" y2="12" stroke="#1E293B" stroke-width="2"/>
  <line x1="36" y1="12" x2="38" y2="15" stroke="#1E293B" stroke-width="2"/>
</svg>
