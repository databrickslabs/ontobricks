<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3621"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#6EE7DE"/>
    </linearGradient>
  </defs>
  
  <!-- Bottom layer - Data (Databricks) -->
  <path d="M8 44 L32 54 L56 44 L56 50 L32 60 L8 50 Z" fill="url(#layer1)"/>
  
  <!-- Middle layer - Mapping -->
  <path d="M8 32 L32 42 L56 32 L56 38 L32 48 L8 38 Z" fill="url(#layer2)"/>
  
  <!-- Top layer - Ontology -->
  <path d="M8 20 L32 30 L56 20 L56 26 L32 36 L8 26 Z" fill="url(#layer3)"/>
  
  <!-- Knowledge graph nodes floating above -->
  <g transform="translate(0, -2)">
    <!-- Central hub node -->
    <circle cx="32" cy="14" r="5" fill="#1E293B"/>
    <circle cx="32" cy="14" r="3" fill="#FF3621"/>
    
    <!-- Connected satellite nodes -->
    <circle cx="18" cy="10" r="3.5" fill="#6366F1"/>
    <circle cx="46" cy="10" r="3.5" fill="#6366F1"/>
    <circle cx="24" cy="20" r="3" fill="#4ECDC4"/>
    <circle cx="40" cy="20" r="3" fill="#4ECDC4"/>
    
    <!-- Graph edges -->
    <g stroke="#1E293B" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
      <line x1="28" y1="12" x2="21" y2="11"/>
      <line x1="36" y1="12" x2="43" y2="11"/>
      <line x1="29" y1="16" x2="26" y2="18"/>
      <line x1="35" y1="16" x2="38" y2="18"/>
      <line x1="18" y1="13" x2="22" y2="18"/>
      <line x1="46" y1="13" x2="42" y2="18"/>
    </g>
  </g>
  
  <!-- Subtle sparkle effect -->
  <circle cx="50" cy="6" r="1" fill="#F59E0B"/>
  <circle cx="14" cy="8" r="0.8" fill="#F59E0B"/>
</svg>
