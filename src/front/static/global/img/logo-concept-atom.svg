<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Atom-like structure - orbits with brick core -->
  
  <!-- Orbital paths -->
  <ellipse cx="32" cy="32" rx="24" ry="10" stroke="#4ECDC4" stroke-width="2" fill="none" transform="rotate(-30 32 32)"/>
  <ellipse cx="32" cy="32" rx="24" ry="10" stroke="#6366F1" stroke-width="2" fill="none" transform="rotate(30 32 32)"/>
  <ellipse cx="32" cy="32" rx="24" ry="10" stroke="#FF3621" stroke-width="2" fill="none" transform="rotate(90 32 32)"/>
  
  <!-- Core brick -->
  <rect x="24" y="24" width="16" height="16" rx="3" fill="#1E293B"/>
  
  <!-- Electron nodes -->
  <circle cx="14" cy="20" r="4" fill="#4ECDC4"/>
  <circle cx="50" cy="20" r="4" fill="#6366F1"/>
  <circle cx="32" cy="8" r="4" fill="#FF3621"/>
  <circle cx="14" cy="44" r="4" fill="#6366F1"/>
  <circle cx="50" cy="44" r="4" fill="#4ECDC4"/>
  <circle cx="32" cy="56" r="4" fill="#FF3621"/>
</svg>
