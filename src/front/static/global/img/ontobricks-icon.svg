<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- OntoBricks Logo - Network "O" with Databricks logo in center -->
  
  <!-- Connection lines first (behind nodes) -->
  <g stroke="#1E293B" stroke-width="2">
    <line x1="32" y1="10" x2="48" y2="18"/>
    <line x1="48" y1="18" x2="52" y2="32"/>
    <line x1="52" y1="32" x2="48" y2="46"/>
    <line x1="48" y1="46" x2="32" y2="54"/>
    <line x1="32" y1="54" x2="16" y2="46"/>
    <line x1="16" y1="46" x2="12" y2="32"/>
    <line x1="12" y1="32" x2="16" y2="18"/>
    <line x1="16" y1="18" x2="32" y2="10"/>
  </g>
  
  <!-- Nodes forming "O" shape -->
  <circle cx="32" cy="10" r="5" fill="#FF3621"/>
  <circle cx="48" cy="18" r="5" fill="#6366F1"/>
  <circle cx="52" cy="32" r="5" fill="#4ECDC4"/>
  <circle cx="48" cy="46" r="5" fill="#F59E0B"/>
  <circle cx="32" cy="54" r="5" fill="#FF3621"/>
  <circle cx="16" cy="46" r="5" fill="#6366F1"/>
  <circle cx="12" cy="32" r="5" fill="#4ECDC4"/>
  <circle cx="16" cy="18" r="5" fill="#F59E0B"/>
  
  <!-- Databricks logo in center (stylized 3 stacked diamonds) -->
  <g transform="translate(32, 32)">
    <!-- Top diamond -->
    <path d="M0 -10 L8 -5 L0 0 L-8 -5 Z" fill="#FF3621"/>
    <!-- Middle diamond -->
    <path d="M0 -4 L8 1 L0 6 L-8 1 Z" fill="#FF3621" opacity="0.85"/>
    <!-- Bottom diamond -->
    <path d="M0 2 L8 7 L0 12 L-8 7 Z" fill="#FF3621" opacity="0.7"/>
  </g>
</svg>
