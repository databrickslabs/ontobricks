name: Bug Report
title: '[BUG]: '
description: Create a report to help us improve OntoBricks
labels: bug,needs-triage
body:
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
      - label: I have searched the existing issues
        required: true

  - type: textarea
    attributes:
      label: Current Behavior
      description: |
        A concise description of what you're experiencing.
        **Do not paste links to attachments with logs and/or images, as all issues with attachments will get deleted.**
        Use the `Relevant log output` field to paste redacted log output without personal identifying information (PII).
        You can Ctrl/Cmd+V a screenshot, which will appear as a rendered image if it doesn't contain any PII.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: A concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Navigate to ...
        2. Click on ...
        3. Execute SPARQL query ...
        4. See error ...
    validations:
      required: true

  - type: dropdown
    id: cloud
    attributes:
      label: Cloud
      description: What cloud is your Databricks workspace running on?
      options:
        - AWS
        - Azure
        - GCP
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser are you using?
      options:
        - Chrome
        - Firefox
        - Edge
        - Safari
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OntoBricks Version
      description: What version of OntoBricks are you running? (check Settings page)
      placeholder: e.g. 0.1.1
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell

  - type: textarea
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (ontology format, triple store type, etc.)
    validations:
      required: false
