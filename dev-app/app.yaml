# OntoBricks (dev sandbox) — Databricks Apps Configuration
# See: https://docs.databricks.com/en/dev-tools/databricks-apps/configuration.html
#
# This is the app.yaml for the *sandbox* app named ``ontobricks-dev``,
# declared in databricks.yml under the ``dev`` and ``dev-lakebase``
# target overlays. The directory ``dev-app/`` only contains this file
# plus symlinks to the real source tree (``src/``, ``run.py``,
# ``pyproject.toml`` …) so we do not duplicate code between the prod
# and dev apps. Keep this file in sync with the repo-root ``app.yaml``
# whenever the runtime contract changes.

# Command to run the application (FastAPI with uvicorn)
command:
  - "uv"
  - "run"
  - "python"
  - "run.py"

env:
  # SQL Warehouse ID — injected from the configured resource,
  # with a static fallback for MCP / session-less API calls
  - name: DATABRICKS_SQL_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: DATABRICKS_SQL_WAREHOUSE_ID_DEFAULT
    value: "66e8366e84d57752"
  - name: DATABRICKS_CATALOG
    value: "main"
  - name: DATABRICKS_SCHEMA
    value: "default"
  - name: DATABRICKS_TRIPLESTORE_TABLE
    value: "benoit_cayla.ontobricks.default_triplestore"
  # Domain Registry — injected from the configured Volume resource.
  - name: REGISTRY_VOLUME_PATH
    valueFrom: volume
  - name: REGISTRY_CATALOG
    value: "benoit_cayla"
  - name: REGISTRY_SCHEMA
    value: "ontobricks"
  - name: REGISTRY_VOLUME
    value: "OntoBricksRegistry"
  # App name used by the permission service to identify the deployed
  # app instance — must match the resource ``name`` in databricks.yml
  # (``ontobricks-dev``), otherwise admin discovery / role lookups
  # would target the prod ``ontobricks`` app.
  - name: ONTOBRICKS_APP_NAME
    value: "ontobricks-dev"
  # ── Lakebase (optional, dev-lakebase target only) ─────────────
  # When deployed to ``-t dev-lakebase`` the bundle binds a
  # ``database`` resource and the runtime auto-injects PGHOST /
  # PGPORT / PGDATABASE / PGUSER / PGAPPNAME / PGSSLMODE.
  - name: LAKEBASE_SCHEMA
    value: "ontobricks_registry"
  - name: MLFLOW_TRACKING_URI
    value: "databricks"

resources:
  - name: sql-warehouse
    description: "SQL Warehouse for executing queries and metadata operations"
    sql_warehouse:
      permission: CAN_USE
  - name: volume
    description: "Unity Catalog Volume for the OntoBricks domain registry"
    volume:
      permission: CAN_READ_WRITE
