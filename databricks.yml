# OntoBricks Dev Sandbox — Databricks Asset Bundle
#
# This bundle deploys the OntoBricks **development sandbox app**
# (``ontobricks-dev``) only. It is intentionally separate from the
# production ``ontobricks`` and ``mcp-ontobricks`` apps:
#
# - Different ``bundle.name`` (``ontobricks_dev_bundle``) so DAB state
#   does not collide with any prior ``ontobricks_bundle`` deployment.
# - Different ``workspace.root_path`` so the sync directory and the
#   ``.bundle/state/`` tracking files live under their own folder
#   (``/Workspace/Users/<me>/.bundle/ontobricks-dev/<target>``).
# - Only ``ontobricks_dev_app`` is declared. ``databricks bundle deploy``
#   here can never touch the production ``ontobricks`` /
#   ``mcp-ontobricks`` apps because this bundle simply does not know
#   about them.
#
# Source code: shipped straight from the repository root. Because this
# bundle declares only one app, the "duplicate source_code_path" rule
# does not apply, so we no longer need a wrapper directory. The
# sandbox auto-detects its app name (``ontobricks-dev``) from the
# Databricks-Apps-injected ``DATABRICKS_APP_NAME`` env var — see
# ``Settings.ontobricks_app_name`` for the alias-chain logic.
#
# Usage:
#   databricks bundle validate                       # validate dev
#   databricks bundle deploy                         # deploy + register sandbox (Volume backend)
#   databricks bundle run ontobricks_dev_app         # start the sandbox
#   databricks bundle deploy -t dev-lakebase         # opt into the Lakebase backend
#
# To re-introduce the production apps later, restore the previous
# ``databricks.yml`` from git history (commit before
# 2026-04-27 "Carve ontobricks-dev into its own DAB").

bundle:
  name: ontobricks_dev_bundle

workspace:
  # Sandbox path — distinct from any other ``ontobricks*`` bundle so
  # we cannot share/clobber sync state with the production apps.
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/ontobricks-dev/${bundle.target}

sync:
  exclude:
    - tests/
    - data/
    - .venv/
    - .git/
    - .cursor/
    - .pytest_cache/
    - htmlcov/
    - logs/
    - fastapi_session/
    - mlruns/
    - mlartifacts/
    - "*.pid"
    - "*.log"
    - ".env"
    - scripts/
    - Makefile
    - CHANGELOG.md
    # docs/*.md are served by the in-app Help Center
    # (see src/front/routes/help.py → /api/help/docs/*), so the docs/
    # folder itself must stay in the bundle. Only strip the Sphinx
    # build output, which is not needed at runtime.
    - docs/sphinx/

variables:
  warehouse_id:
    description: "SQL Warehouse ID for query execution"
    default: "d2096aa075ad44a3"
  registry_catalog:
    description: "Unity Catalog catalog for the domain registry"
    default: "benoit_cayla"
  registry_schema:
    description: "Unity Catalog schema for the domain registry"
    default: "ontobricks_deployed"
  registry_volume:
    description: "Volume name for the domain registry"
    default: "registry"

  # ── Lakebase resource binding (Autoscaling-only) ────────────────
  # OntoBricks targets **Lakebase Autoscaling** exclusively (the
  # default tier for every instance created after 2026-03-12). The
  # legacy Provisioned tier is no longer supported — the runtime
  # auth code (``LakebaseAuth``) and the admin UI both assume an
  # Autoscaling project resource.
  #
  # Autoscaling uses the Apps ``postgres: { branch, database }``
  # binding where both fields are *full project-relative resource
  # paths*. New instances created via ``databricks api create
  # /database/instances`` show up as Autoscaling projects with a
  # default branch named ``production`` (NOT ``main``).
  #
  # Defaults match the dev sandbox instance ``ontobricks-app``;
  # override at deploy time with e.g.
  # ``-t dev-lakebase --var=lakebase_branch=...``.
  lakebase_branch:
    description: "Full Lakebase Autoscaling branch resource path (e.g. ``projects/<project>/branches/production``)"
    default: "projects/ontobricks-app/branches/production"
  lakebase_database_resource:
    description: |
      Full Lakebase Autoscaling database resource path (e.g.
      ``projects/<project>/branches/production/databases/db-xxx-yyy``).
      Look it up with ``databricks api get
      /api/2.0/postgres/projects/<project>/branches/<branch>/databases``
      and pick the entry whose ``status.postgres_database`` matches
      the human-readable database name you want bound.
    default: "projects/ontobricks-app/branches/production/databases/db-8u4l-0na72ub5sp"

resources:
  apps:
    # ── Dev sandbox app (the only app this bundle manages) ──────
    ontobricks_dev_app:
      name: "ontobricks-dev"
      description: "OntoBricks (development sandbox app)"
      source_code_path: .
      resources:
        - name: sql-warehouse
          description: "SQL Warehouse for executing queries and metadata operations"
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: volume
          description: "Unity Catalog Volume for the OntoBricks domain registry"
          uc_securable:
            securable_type: "VOLUME"
            securable_full_name: "${var.registry_catalog}.${var.registry_schema}.${var.registry_volume}"
            permission: WRITE_VOLUME

targets:
  # Default sandbox: Volume-only registry backend.
  dev:
    mode: development
    default: true

  # Sandbox with the Lakebase Postgres registry backend bound
  # (Autoscaling-only). Uses the Apps ``postgres`` resource type
  # with ``branch`` + ``database`` resource paths — both must be
  # full project-relative paths, not bare names. See the
  # ``lakebase_*`` variables above for the lookup recipe.
  #
  # The Apps runtime injects PGHOST / PGPORT / PGDATABASE /
  # PGUSER / PGAPPNAME / PGSSLMODE for the bound database, so the
  # in-app code path (``LakebaseAuth``) keeps working without any
  # extra config.
  dev-lakebase:
    mode: development
    resources:
      apps:
        ontobricks_dev_app:
          resources:
            - name: postgres
              description: "Lakebase Autoscaling Postgres database for the OntoBricks registry"
              postgres:
                branch: ${var.lakebase_branch}
                database: ${var.lakebase_database_resource}
                permission: "CAN_CONNECT_AND_CREATE"
